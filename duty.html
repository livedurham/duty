} catch (e) {}

/* ============================================================
   台灣行政院人事行政總處 115年(2026) 政府行政機關辦公日曆表
   國定假日 / 放假日（含補假）。2025下半年起取消補班，故2026無補班日。
   逢週六/週日者本就為例假日；以下列出所有「放假日」(含平日補假)。
   ============================================================ */
const HOLIDAYS = {
  "2026-01-01": "元旦",
  "2026-02-14": "春節連假", "2026-02-15": "小年夜", "2026-02-16": "除夕",
  "2026-02-17": "初一", "2026-02-18": "初二", "2026-02-19": "初三",
  "2026-02-20": "初四(小年夜補假)", "2026-02-21": "春節連假", "2026-02-22": "春節連假",
  "2026-02-27": "和平紀念日補假", "2026-02-28": "和平紀念日",
  "2026-04-03": "兒童節補假", "2026-04-04": "兒童節", "2026-04-05": "清明節", "2026-04-06": "清明節補假",
  "2026-05-01": "勞動節",
  "2026-06-19": "端午節",
  "2026-09-25": "中秋節", "2026-09-28": "教師節",
  "2026-10-09": "國慶日補假", "2026-10-10": "國慶日",
  "2026-10-25": "臺灣光復節", "2026-10-26": "臺灣光復節補假",
  "2026-12-25": "行憲紀念日",
};

const DOW = ["日", "一", "二", "三", "四", "五", "六"];
const DEFAULT_NAMES = [
  "林嘉謨", "林鎮均", "葉育雯", "徐培菘", "林士森", "賴君宇",
  "鄭景元", "孫瑞璘", "林佳衡", "白雪芬", "楊哲豪",
];

const pad = (n) => String(n).padStart(2, "0");
const dKey = (y, m, d) => `${y}-${pad(m)}-${pad(d)}`;
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const dowOf = (y, m, d) => new Date(y, m - 1, d).getDay();
const monthKeyOf = (y, m) => `${y}-${pad(m)}`;

function buildCalendar(y, m, overrides = {}) {
  const n = daysInMonth(y, m);
  const out = [];
  for (let d = 1; d <= n; d++) {
    const key = dKey(y, m, d);
    const dow = dowOf(y, m, d);
    let type;
    if (overrides[key]) type = overrides[key];
    else {
      const weekend = dow === 0 || dow === 6;
      const holiday = !!HOLIDAYS[key];
      type = weekend || holiday ? "holiday" : "weekday";
    }
    out.push({ key, day: d, dow, type, holidayName: HOLIDAYS[key] || null });
  }
  return out;
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   排班核心：回溯演算法 (MRV: 最少候選人優先)
   people: [{id,name,wq,hq,off:Set,must:Set,offDows:Set,onlyDows:Set}]
   每日一名值班。回傳 {assignment, conflicts, complete, unfilled}
   ============================================================ */
function backtrack(days, people, allowConsecutive, maxNodes) {
  const idx = {};
  days.forEach((d, i) => (idx[d.key] = i));
  const assignment = {};
  const rem = {};
  people.forEach((p) => (rem[p.id] = { weekday: p.wq, holiday: p.hq }));
  const conflicts = [];

  // 先鎖定「必值日期」
  for (const p of people) {
    for (const key of p.must) {
      const day = days.find((d) => d.key === key);
      if (!day) continue;
      if (assignment[key] !== undefined) {
        conflicts.push(`${day.day}日：多人指定必值（保留先設定者）`);
        continue;
      }
      assignment[key] = p.id;
      rem[p.id][day.type]--;
    }
  }

  const budget = { n: 0, max: maxNodes };
  const neighborsOk = (key, id) => {
    if (allowConsecutive) return true;
    const i = idx[key];
    const prev = days[i - 1], next = days[i + 1];
    if (prev && assignment[prev.key] === id) return false;
    if (next && assignment[next.key] === id) return false;
    return true;
  };
  const candidates = (day) => {
    const list = [];
    for (const p of people) {
      if (p.off.has(day.key)) continue;
      if (p.offDows.has(day.dow)) continue;
      if (p.onlyDows.size > 0 && !p.onlyDows.has(day.dow)) continue;
      if (rem[p.id][day.type] <= 0) continue;
      if (!neighborsOk(day.key, p.id)) continue;
      list.push(p);
    }
    return list;
  };

  function rec() {
    if (++budget.n > budget.max) return false;
    let target = null, best = null;
    for (const day of days) {
      if (assignment[day.key] !== undefined) continue;
      const c = candidates(day);
      if (c.length === 0) return false; // 死路 → 回溯
      if (best === null || c.length < best.length) {
        target = day; best = c;
        if (c.length === 1) break;
      }
    }
    if (target === null) return true; // 全部排完
    const cands = shuffle(best.slice());
    cands.sort((a, b) => rem[b.id][target.type] - rem[a.id][target.type]); // 缺額多者優先
    for (const p of cands) {
      assignment[target.key] = p.id;
      rem[p.id][target.type]--;
      if (rec()) return true;
      delete assignment[target.key];
      rem[p.id][target.type]++;
    }
    return false;
  }

  return rec() ? { assignment, conflicts } : null;
}

function bestEffort(days, people, allowConsecutive) {
  // 退而求其次：盡量填滿，無候選人則留空
  const idx = {};
  days.forEach((d, i) => (idx[d.key] = i));
  const assignment = {};
  const rem = {};
  people.forEach((p) => (rem[p.id] = { weekday: p.wq, holiday: p.hq }));
  for (const p of people)
    for (const key of p.must) {
      const day = days.find((d) => d.key === key);
      if (day && assignment[key] === undefined) {
        assignment[key] = p.id;
        rem[p.id][day.type]--;
      }
    }
  const ordered = days
    .filter((d) => assignment[d.key] === undefined)
    .map((d) => {
      const c = people.filter(
        (p) =>
          !p.off.has(d.key) &&
          !p.offDows.has(d.dow) &&
          (p.onlyDows.size === 0 || p.onlyDows.has(d.dow))
      );
      return { d, n: c.length };
    })
    .sort((a, b) => a.n - b.n)
    .map((x) => x.d);
  for (const day of ordered) {
    const cands = people.filter((p) => {
      if (p.off.has(day.key) || p.offDows.has(day.dow)) return false;
      if (p.onlyDows.size > 0 && !p.onlyDows.has(day.dow)) return false;
      if (rem[p.id][day.type] <= 0) return false;
      if (!allowConsecutive) {
        const i = idx[day.key];
        if (days[i - 1] && assignment[days[i - 1].key] === p.id) return false;
        if (days[i + 1] && assignment[days[i + 1].key] === p.id) return false;
      }
      return true;
    });
    if (cands.length === 0) continue;
    cands.sort((a, b) => rem[b.id][day.type] - rem[a.id][day.type]);
    const p = cands[0];
    assignment[day.key] = p.id;
    rem[p.id][day.type]--;
  }
  const unfilled = days.filter((d) => assignment[d.key] === undefined).map((d) => d.key);
  return { assignment, conflicts: [], unfilled };
}

function solveRoster(days, peopleRaw, { avoidConsecutive = true } = {}) {
  const people = peopleRaw.map((p) => ({
    ...p,
    off: new Set(p.off),
    must: new Set(p.must),
    offDows: new Set(p.offDows),
    onlyDows: new Set(p.onlyDows),
  }));
  const tiers = avoidConsecutive ? [false, true] : [true];
  for (const allowConsecutive of tiers) {
    for (let r = 0; r < 30; r++) {
      const res = backtrack(days, people, allowConsecutive, 250000);
      if (res)
        return { ...res, complete: true, unfilled: [], relaxedConsecutive: allowConsecutive && avoidConsecutive };
    }
  }
  const be = bestEffort(days, people, !avoidConsecutive);
  return { ...be, complete: be.unfilled.length === 0, relaxedConsecutive: true };
}

/* ============================================================
   元件
   ============================================================ */
const STORE_KEY = "tw_duty_roster_v1";

function makeInitialState() {
  return {
    year: 2026,
    month: 6,
    avoidConsecutive: true,
    people: DEFAULT_NAMES.map((name, i) => ({
      id: "p" + i,
      name,
      offDows: [],
      onlyDows: [],
    })),
    months: {}, // monthKey -> { quotas, off, must, overrides, result }
  };
}

function emptyMonth() {
  return { quotas: {}, off: {}, must: {}, overrides: {}, result: {} };
}

function App() {
  const [state, setState] = useState(makeInitialState);
  const [loaded, setLoaded] = useState(false);
  const [savedFlag, setSavedFlag] = useState(false);
  const [openPerson, setOpenPerson] = useState(null);
  const [solveMsg, setSolveMsg] = useState(null);
  const saveTimer = useRef(null);

  // 載入持久化資料
  useEffect(() => {
    (async () => {
      try {
        if (typeof window !== "undefined" && window.storage) {
          const r = await window.storage.get(STORE_KEY);
          if (r && r.value) {
            const parsed = JSON.parse(r.value);
            setState((s) => ({ ...makeInitialState(), ...parsed }));
          }
        }
      } catch (e) {
        /* 第一次使用無資料，忽略 */
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  // 自動儲存（去抖）
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        if (typeof window !== "undefined" && window.storage) {
          await window.storage.set(STORE_KEY, JSON.stringify(state));
          setSavedFlag(true);
          setTimeout(() => setSavedFlag(false), 1500);
        }
      } catch (e) {}
    }, 700);
  }, [state, loaded]);

  const { year, month } = state;
  const mk = monthKeyOf(year, month);
  const monthData = state.months[mk] || emptyMonth();
  const days = useMemo(() => buildCalendar(year, month, monthData.overrides), [year, month, monthData.overrides]);
  const weekdayDays = days.filter((d) => d.type === "weekday");
  const holidayDays = days.filter((d) => d.type === "holiday");

  // ---- 狀態更新工具 ----
  const updateMonth = (mutator) =>
    setState((s) => {
      const cur = s.months[mk] || emptyMonth();
      const next = { ...cur };
      mutator(next);
      return { ...s, months: { ...s.months, [mk]: next } };
    });

  const getQuota = (pid) => monthData.quotas[pid] || { wq: 0, hq: 0 };
  const setQuota = (pid, field, val) =>
    updateMonth((m) => {
      m.quotas = { ...m.quotas };
      m.quotas[pid] = { ...(m.quotas[pid] || { wq: 0, hq: 0 }), [field]: Math.max(0, val | 0) };
    });

  const getDates = (pid) => ({
    off: monthData.off[pid] || [],
    must: monthData.must[pid] || [],
  });

  const cycleDate = (pid, key) =>
    updateMonth((m) => {
      m.off = { ...m.off };
      m.must = { ...m.must };
      const off = new Set(m.off[pid] || []);
      const must = new Set(m.must[pid] || []);
      if (!off.has(key) && !must.has(key)) off.add(key);
      else if (off.has(key)) {
        off.delete(key);
        must.add(key);
      } else must.delete(key);
      m.off[pid] = [...off];
      m.must[pid] = [...must];
    });

  const clearPersonDates = (pid) =>
    updateMonth((m) => {
      m.off = { ...m.off, [pid]: [] };
      m.must = { ...m.must, [pid]: [] };
    });

  const toggleDow = (pid, field, dow) =>
    setState((s) => ({
      ...s,
      people: s.people.map((p) => {
        if (p.id !== pid) return p;
        const set = new Set(p[field]);
        set.has(dow) ? set.delete(dow) : set.add(dow);
        return { ...p, [field]: [...set].sort() };
      }),
    }));

  const setName = (pid, name) =>
    setState((s) => ({ ...s, people: s.people.map((p) => (p.id === pid ? { ...p, name } : p)) }));

  const toggleDayType = (key) =>
    updateMonth((m) => {
      m.overrides = { ...m.overrides };
      const cur = m.overrides[key];
      const base = HOLIDAYS[key] || [0, 6].includes(dowOf(year, month, +key.slice(-2)));
      // 簡化：直接在 weekday/holiday 間切換
      const day = days.find((d) => d.key === key);
      m.overrides[key] = day.type === "weekday" ? "holiday" : "weekday";
    });

  // ---- 平衡檢查 ----
  const totalWQ = state.people.reduce((s, p) => s + getQuota(p.id).wq, 0);
  const totalHQ = state.people.reduce((s, p) => s + getQuota(p.id).hq, 0);
  const wqBalanced = totalWQ === weekdayDays.length;
  const hqBalanced = totalHQ === holidayDays.length;

  // ---- 執行排班 ----
  const runSolve = () => {
    const peopleRaw = state.people.map((p) => {
      const q = getQuota(p.id);
      const dts = getDates(p.id);
      return {
        id: p.id, name: p.name, wq: q.wq, hq: q.hq,
        off: dts.off, must: dts.must, offDows: p.offDows, onlyDows: p.onlyDows,
      };
    });
    const res = solveRoster(days, peopleRaw, { avoidConsecutive: state.avoidConsecutive });
    updateMonth((m) => {
      m.result = { ...res.assignment };
    });
    if (!res.complete)
      setSolveMsg({ type: "warn", text: `已盡量排班，但有 ${res.unfilled.length} 天無法滿足限制而留空，請調整需求或限制。` });
    else if (res.relaxedConsecutive)
      setSolveMsg({ type: "warn", text: "已完成排班，但因限制較緊，部分人員出現連續值班。" });
    else setSolveMsg({ type: "ok", text: "排班完成，所有日期皆已分配且無連續值班。" });
  };

  const reassign = (key, pid) =>
    updateMonth((m) => {
      m.result = { ...m.result };
      if (pid === "") delete m.result[key];
      else m.result[key] = pid;
    });

  const clearResult = () => updateMonth((m) => (m.result = {}));

  // ---- 統計與衝突 ----
  const personById = useMemo(() => Object.fromEntries(state.people.map((p) => [p.id, p])), [state.people]);
  const tally = useMemo(() => {
    const t = {};
    state.people.forEach((p) => (t[p.id] = { weekday: 0, holiday: 0 }));
    days.forEach((d) => {
      const pid = monthData.result[d.key];
      if (pid && t[pid]) t[pid][d.type]++;
    });
    return t;
  }, [days, monthData.result, state.people]);

  const conflictOf = (day) => {
    const pid = monthData.result[day.key];
    if (!pid) return null;
    const p = personById[pid];
    if (!p) return null;
    const dts = getDates(pid);
    if (dts.off.includes(day.key)) return "違反不值日期";
    if (p.offDows.includes(day.dow)) return "違反不值星期";
    if (p.onlyDows.length > 0 && !p.onlyDows.includes(day.dow)) return "違反限定星期";
    const i = days.findIndex((d) => d.key === day.key);
    if (state.avoidConsecutive) {
      if (days[i - 1] && monthData.result[days[i - 1].key] === pid) return "連續值班";
      if (days[i + 1] && monthData.result[days[i + 1].key] === pid) return "連續值班";
    }
    return null;
  };

  // ---- 匯出 Word（.doc / HTML 格式，免安裝套件，可直接用 Word 開啟）----
  const exportWord = () => {
    const fdow = dowOf(year, month, 1);
    const cells = [];
    for (let i = 0; i < fdow; i++) cells.push(null);
    days.forEach((d) => cells.push(d));
    while (cells.length % 7 !== 0) cells.push(null);

    const head =
      "<tr>" +
      DOW.map((d, i) => `<th class="${i === 0 || i === 6 ? "we" : ""}">${d}</th>`).join("") +
      "</tr>";

    let grid = "";
    for (let w = 0; w < cells.length / 7; w++) {
      grid += "<tr>";
      for (let c = 0; c < 7; c++) {
        const d = cells[w * 7 + c];
        if (!d) { grid += '<td class="empty"></td>'; continue; }
        const pid = monthData.result[d.key];
        const name = pid ? personById[pid]?.name || "" : "";
        const cls = d.type === "holiday" ? "hol" : "wd";
        grid +=
          `<td class="${cls}"><div class="dnum">${d.day}</div>` +
          (d.holidayName ? `<div class="hname">${d.holidayName}</div>` : "") +
          `<div class="who">${name || "&nbsp;"}</div></td>`;
      }
      grid += "</tr>";
    }

    let summary = "";
    state.people.forEach((p) => {
      const t = tally[p.id];
      summary += `<tr><td>${p.name}</td><td class="ctr">${t.weekday}</td><td class="ctr">${t.holiday}</td><td class="ctr">${t.weekday + t.holiday}</td></tr>`;
    });

    const html =
`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>值班表</title>
<style>
body{font-family:'微軟正黑體','Microsoft JhengHei',sans-serif;color:#222;}
h1{font-size:18pt;text-align:center;margin:0 0 12pt;}
h2{font-size:13pt;margin:18pt 0 6pt;}
table{border-collapse:collapse;width:100%;}
.cal td,.cal th{border:1px solid #888;}
.cal th{background:#eef0f2;padding:5px;font-size:11pt;text-align:center;}
.cal th.we{color:#c0392b;}
.cal td{width:14.28%;height:66px;vertical-align:top;padding:3px 4px;font-size:10pt;}
.cal td.hol{background:#fdecea;}
.cal td.empty{background:#fafafa;}
.dnum{font-weight:bold;font-size:11pt;}
.hol .dnum{color:#c0392b;}
.hname{color:#c0392b;font-size:7pt;}
.who{margin-top:8px;text-align:center;font-size:13pt;font-weight:bold;}
.sum td,.sum th{border:1px solid #888;padding:5px 10px;font-size:11pt;}
.sum th{background:#eef0f2;}
.ctr{text-align:center;}
.note{font-size:9pt;color:#888;margin-top:4pt;}
</style></head>
<body>
<h1>${year} 年 ${month} 月 值班表</h1>
<table class="cal">${head}${grid}</table>
<p class="note">平日班 ${weekdayDays.length} 天、假日班 ${holidayDays.length} 天（紅底為假日）。</p>
<h2>分配統計</h2>
<table class="sum"><tr><th>人員</th><th>平日班</th><th>假日班</th><th>合計</th></tr>${summary}</table>
</body></html>`;

    const blob = new Blob(["\ufeff", html], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `值班表_${mk}.doc`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const copyText = () => {
    let txt = `${year}年${month}月 值班表\n`;
    days.forEach((d) => {
      const pid = monthData.result[d.key];
      const name = pid ? personById[pid]?.name || "" : "（未排）";
      txt += `${month}/${d.day}（${DOW[d.dow]}）${d.type === "holiday" ? "假" : "平"} ${name}\n`;
    });
    navigator.clipboard?.writeText(txt);
    setSolveMsg({ type: "ok", text: "已複製文字版值班表到剪貼簿。" });
  };

  // ---- 月份切換 ----
  const changeMonth = (delta) =>
    setState((s) => {
      let m = s.month + delta, y = s.year;
      if (m > 12) { m = 1; y++; }
      if (m < 1) { m = 12; y--; }
      return { ...s, month: m, year: y };
    });

  const hasResult = Object.keys(monthData.result).length > 0;
  const firstDow = dowOf(year, month, 1);

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 p-4 sm:p-6" style={{ fontFamily: "system-ui, 'Microsoft JhengHei', sans-serif" }}>
      <div className="max-w-6xl mx-auto">
        {/* Header */}
        <header className="flex flex-wrap items-center justify-between gap-3 mb-5">
          <div>
            <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
              <Calendar className="w-6 h-6 text-teal-600" /> 值班排班系統
            </h1>
            <p className="text-sm text-slate-500 mt-1">依台灣人事行政總處行事曆自動區分平日／假日班</p>
          </div>
          <div className="flex items-center gap-2 text-xs text-slate-400">
            {savedFlag && (<span className="flex items-center gap-1 text-teal-600"><Save className="w-3.5 h-3.5" />已自動儲存</span>)}
          </div>
        </header>

        {/* 月份與分類摘要 */}
        <section className="bg-white rounded-xl border border-slate-200 p-4 mb-4">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <button onClick={() => changeMonth(-1)} className="px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm">‹ 上月</button>
              <div className="text-lg font-semibold tabular-nums px-2">{year} 年 {month} 月</div>
              <button onClick={() => changeMonth(1)} className="px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm">下月 ›</button>
            </div>
            <div className="flex items-center gap-4 text-sm">
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-sky-100 border border-sky-300 inline-block" />平日班 <b className="tabular-nums">{weekdayDays.length}</b> 天</span>
              <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-rose-100 border border-rose-300 inline-block" />假日班 <b className="tabular-nums">{holidayDays.length}</b> 天</span>
            </div>
          </div>
          <p className="text-xs text-slate-400 mt-3 flex items-start gap-1.5">
            <Info className="w-3.5 h-3.5 mt-0.5 shrink-0" />
            點擊下方任一日期方塊可手動切換「平日／假日」分類（例如院內自訂的補班或特殊安排）。2026 年國定假日已內建。
          </p>
          {/* 行事曆分類預覽 */}
          <div className="mt-3 grid grid-cols-7 gap-1 text-center">
            {DOW.map((d, i) => (
              <div key={i} className={`text-xs font-medium py-1 ${i === 0 || i === 6 ? "text-rose-500" : "text-slate-400"}`}>{d}</div>
            ))}
            {Array.from({ length: firstDow }).map((_, i) => <div key={"b" + i} />)}
            {days.map((d) => (
              <button
                key={d.key}
                onClick={() => toggleDayType(d.key)}
                title={d.holidayName || (d.type === "holiday" ? "假日" : "平日")}
                className={`rounded-md py-1.5 text-xs border transition ${
                  d.type === "holiday"
                    ? "bg-rose-50 border-rose-200 text-rose-700 hover:bg-rose-100"
                    : "bg-sky-50 border-sky-100 text-slate-600 hover:bg-sky-100"
                }`}
              >
                <div className="font-semibold tabular-nums">{d.day}</div>
                {d.holidayName && <div className="text-[9px] leading-tight truncate px-0.5">{d.holidayName}</div>}
              </button>
            ))}
          </div>
        </section>

        {/* 平衡檢查 */}
        <section className="grid sm:grid-cols-2 gap-3 mb-4">
          <BalanceBar label="平日班" total={totalWQ} need={weekdayDays.length} balanced={wqBalanced} color="sky" />
          <BalanceBar label="假日班" total={totalHQ} need={holidayDays.length} balanced={hqBalanced} color="rose" />
        </section>

        {/* 人員設定 */}
        <section className="bg-white rounded-xl border border-slate-200 mb-4 overflow-hidden">
          <div className="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
            <Users className="w-4 h-4 text-teal-600" />
            <h2 className="font-semibold text-slate-800">人員需求與限制</h2>
            <span className="text-xs text-slate-400 ml-auto">{state.people.length} 人</span>
          </div>
          <div className="divide-y divide-slate-100">
            {state.people.map((p, idx) => {
              const q = getQuota(p.id);
              const dts = getDates(p.id);
              const open = openPerson === p.id;
              return (
                <div key={p.id}>
                  <div className="flex items-center gap-3 px-4 py-2.5">
                    <button onClick={() => setOpenPerson(open ? null : p.id)} className="text-slate-400 hover:text-slate-600">
                      {open ? <ChevronDown className="w-4 h-4" /> : <ChevronRight className="w-4 h-4" />}
                    </button>
                    <span className="text-xs text-slate-300 tabular-nums w-5">{idx + 1}</span>
                    <input
                      value={p.name}
                      onChange={(e) => setName(p.id, e.target.value)}
                      className="font-medium text-slate-800 bg-transparent w-24 sm:w-32 focus:outline-none focus:border-b focus:border-teal-400"
                    />
                    <div className="flex items-center gap-2 ml-auto text-sm">
                      <label className="flex items-center gap-1 text-slate-500">平日
                        <input type="number" min="0" value={q.wq}
                          onChange={(e) => setQuota(p.id, "wq", +e.target.value)}
                          className="w-14 px-1.5 py-1 rounded border border-slate-200 text-center tabular-nums focus:outline-none focus:border-sky-400" />
                      </label>
                      <label className="flex items-center gap-1 text-slate-500">假日
                        <input type="number" min="0" value={q.hq}
                          onChange={(e) => setQuota(p.id, "hq", +e.target.value)}
                          className="w-14 px-1.5 py-1 rounded border border-slate-200 text-center tabular-nums focus:outline-none focus:border-rose-400" />
                      </label>
                    </div>
                  </div>
                  {!open && (dts.off.length > 0 || dts.must.length > 0 || p.offDows.length > 0 || p.onlyDows.length > 0) && (
                    <div className="px-4 pb-2 -mt-1 ml-12 flex flex-wrap gap-1.5 text-[11px]">
                      {dts.must.length > 0 && <span className="px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700">必值 {dts.must.length} 天</span>}
                      {dts.off.length > 0 && <span className="px-1.5 py-0.5 rounded bg-rose-50 text-rose-700">不值 {dts.off.length} 天</span>}
                      {p.offDows.length > 0 && <span className="px-1.5 py-0.5 rounded bg-amber-50 text-amber-700">不值週 {p.offDows.map((x) => DOW[x]).join("、")}</span>}
                      {p.onlyDows.length > 0 && <span className="px-1.5 py-0.5 rounded bg-violet-50 text-violet-700">限週 {p.onlyDows.map((x) => DOW[x]).join("、")}</span>}
                    </div>
                  )}
                  {open && (
                    <div className="px-4 pb-4 pt-1 bg-slate-50/60">
                      {/* 星期限制 */}
                      <div className="grid sm:grid-cols-2 gap-4 mb-3">
                        <DowPicker label="不值班的星期" hint="勾選的星期不會排班" color="rose"
                          selected={p.offDows} onToggle={(d) => toggleDow(p.id, "offDows", d)} />
                        <DowPicker label="限定只值這些星期" hint="留空＝不限制；勾選後僅排在這些星期" color="violet"
                          selected={p.onlyDows} onToggle={(d) => toggleDow(p.id, "onlyDows", d)} />
                      </div>
                      {/* 日期限制 mini calendar */}
                      <div className="flex items-center justify-between mb-1.5">
                        <div className="text-xs text-slate-500">點日期切換：
                          <span className="text-rose-600 mx-1">● 不值</span>→
                          <span className="text-emerald-600 mx-1">● 必值</span>→ 取消
                        </div>
                        <button onClick={() => clearPersonDates(p.id)} className="text-xs text-slate-400 hover:text-slate-600 flex items-center gap-1"><Eraser className="w-3 h-3" />清除</button>
                      </div>
                      <div className="grid grid-cols-7 gap-1 text-center max-w-md">
                        {DOW.map((d, i) => <div key={i} className="text-[10px] text-slate-400">{d}</div>)}
                        {Array.from({ length: firstDow }).map((_, i) => <div key={"mb" + i} />)}
                        {days.map((d) => {
                          const isOff = dts.off.includes(d.key);
                          const isMust = dts.must.includes(d.key);
                          return (
                            <button key={d.key} onClick={() => cycleDate(p.id, d.key)}
                              className={`rounded text-xs py-1 border tabular-nums ${
                                isMust ? "bg-emerald-500 text-white border-emerald-500"
                                : isOff ? "bg-rose-500 text-white border-rose-500"
                                : d.type === "holiday" ? "bg-white text-rose-400 border-slate-200 hover:border-rose-300"
                                : "bg-white text-slate-500 border-slate-200 hover:border-slate-300"}`}>
                              {d.day}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </section>

        {/* 控制列 */}
        <section className="bg-white rounded-xl border border-slate-200 p-4 mb-4">
          <div className="flex flex-wrap items-center gap-3">
            <button onClick={runSolve}
              className="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-teal-600 text-white font-medium hover:bg-teal-700 shadow-sm">
              <Wand2 className="w-4 h-4" /> 開始排班
            </button>
            {hasResult && (
              <button onClick={runSolve} className="flex items-center gap-2 px-3 py-2.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm">
                <RefreshCw className="w-4 h-4" /> 重排（換一組）
              </button>
            )}
            <label className="flex items-center gap-2 text-sm text-slate-600 ml-1">
              <input type="checkbox" checked={state.avoidConsecutive}
                onChange={(e) => setState((s) => ({ ...s, avoidConsecutive: e.target.checked }))}
                className="rounded" />
              避免連續兩天值班
            </label>
            {hasResult && (
              <div className="flex items-center gap-2 ml-auto">
                <button onClick={copyText} className="flex items-center gap-1.5 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm"><Copy className="w-4 h-4" />複製文字</button>
                <button onClick={exportWord} className="flex items-center gap-1.5 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm"><Download className="w-4 h-4" />匯出 Word</button>
                <button onClick={clearResult} className="px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm text-slate-500"><X className="w-4 h-4" /></button>
              </div>
            )}
          </div>
          {solveMsg && (
            <div className={`mt-3 text-sm rounded-lg px-3 py-2 flex items-center gap-2 ${
              solveMsg.type === "ok" ? "bg-emerald-50 text-emerald-700" : "bg-amber-50 text-amber-700"}`}>
              {solveMsg.type === "ok" ? <CheckCircle2 className="w-4 h-4" /> : <AlertTriangle className="w-4 h-4" />}
              {solveMsg.text}
            </div>
          )}
        </section>

        {/* 結果：值班表 */}
        {hasResult && (
          <section className="bg-white rounded-xl border border-slate-200 p-4 mb-4">
            <h2 className="font-semibold text-slate-800 mb-3">{year} 年 {month} 月 值班表</h2>
            <div className="grid grid-cols-7 gap-1.5">
              {DOW.map((d, i) => (
                <div key={i} className={`text-xs font-medium text-center py-1 ${i === 0 || i === 6 ? "text-rose-500" : "text-slate-400"}`}>{d}</div>
              ))}
              {Array.from({ length: firstDow }).map((_, i) => <div key={"rb" + i} />)}
              {days.map((d) => {
                const pid = monthData.result[d.key];
                const conflict = conflictOf(d);
                return (
                  <div key={d.key}
                    className={`rounded-lg border p-1.5 min-h-[64px] flex flex-col ${
                      conflict ? "border-red-400 ring-1 ring-red-300 bg-red-50"
                      : d.type === "holiday" ? "border-rose-200 bg-rose-50/50"
                      : "border-slate-200 bg-white"}`}>
                    <div className="flex items-center justify-between">
                      <span className={`text-xs font-semibold tabular-nums ${d.type === "holiday" ? "text-rose-600" : "text-slate-500"}`}>{d.day}</span>
                      {d.holidayName && <span className="text-[8px] text-rose-400 truncate max-w-[60%]">{d.holidayName}</span>}
                    </div>
                    <select value={pid || ""} onChange={(e) => reassign(d.key, e.target.value)}
                      className={`mt-1 w-full text-xs rounded border px-1 py-1 focus:outline-none ${
                        pid ? "bg-white border-slate-200 text-slate-700" : "bg-amber-50 border-amber-200 text-amber-600"}`}>
                      <option value="">未排</option>
                      {state.people.map((pp) => <option key={pp.id} value={pp.id}>{pp.name}</option>)}
                    </select>
                    {conflict && <span className="text-[9px] text-red-500 mt-0.5">{conflict}</span>}
                  </div>
                );
              })}
            </div>
          </section>
        )}

        {/* 統計 */}
        {hasResult && (
          <section className="bg-white rounded-xl border border-slate-200 p-4 mb-8">
            <h2 className="font-semibold text-slate-800 mb-3">分配統計（實際 / 目標）</h2>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-slate-400 border-b border-slate-100">
                    <th className="py-2 font-medium">人員</th>
                    <th className="py-2 font-medium text-center">平日班</th>
                    <th className="py-2 font-medium text-center">假日班</th>
                    <th className="py-2 font-medium text-center">合計</th>
                  </tr>
                </thead>
                <tbody>
                  {state.people.map((p) => {
                    const q = getQuota(p.id);
                    const t = tally[p.id];
                    const wOk = t.weekday === q.wq, hOk = t.holiday === q.hq;
                    return (
                      <tr key={p.id} className="border-b border-slate-50">
                        <td className="py-2 font-medium text-slate-700">{p.name}</td>
                        <td className={`py-2 text-center tabular-nums ${wOk ? "text-slate-600" : "text-amber-600 font-semibold"}`}>{t.weekday} / {q.wq}</td>
                        <td className={`py-2 text-center tabular-nums ${hOk ? "text-slate-600" : "text-amber-600 font-semibold"}`}>{t.holiday} / {q.hq}</td>
                        <td className="py-2 text-center tabular-nums text-slate-500">{t.weekday + t.holiday}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </section>
        )}
      </div>
    </div>
  );
}

function BalanceBar({ label, total, need, balanced, color }) {
  const c = color === "sky" ? "sky" : "rose";
  return (
    <div className={`rounded-xl border p-3 flex items-center justify-between ${balanced ? "border-slate-200 bg-white" : "border-amber-300 bg-amber-50"}`}>
      <div className="text-sm text-slate-600">{label}需求總和</div>
      <div className="flex items-center gap-2">
        <span className="text-sm tabular-nums">
          <b className={balanced ? "text-slate-800" : "text-amber-700"}>{total}</b>
          <span className="text-slate-400"> / 需 {need}</span>
        </span>
        {balanced
          ? <CheckCircle2 className="w-4 h-4 text-emerald-500" />
          : <span className="text-xs text-amber-700 font-medium">差 {need - total > 0 ? `少 ${need - total}` : `多 ${total - need}`}</span>}
      </div>
    </div>
  );
}

function DowPicker({ label, hint, selected, onToggle, color }) {
  const ring = color === "rose" ? "bg-rose-500 border-rose-500" : "bg-violet-500 border-violet-500";
  return (
    <div>
      <div className="text-xs font-medium text-slate-600">{label}</div>
      <div className="text-[10px] text-slate-400 mb-1.5">{hint}</div>
      <div className="flex gap-1">
        {DOW.map((d, i) => {
          const on = selected.includes(i);
          return (
            <button key={i} onClick={() => onToggle(i)}
              className={`w-8 h-8 rounded-md text-xs border ${on ? `${ring} text-white` : "bg-white border-slate-200 text-slate-500 hover:border-slate-300"}`}>
              {d}
            </button>
          );
        })}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
