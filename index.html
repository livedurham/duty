<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>值班排班系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script defer src="app.js"></script>
<style> body { margin:0; font-family: system-ui, "Microsoft JhengHei", sans-serif; } </style>
</head>
<body>
<div id="root" style="padding:24px;color:#64748b;font-family:system-ui">載入中…</div>
<script>
try {
  if (!window.storage) {
    window.storage = {
      get: async (k) => { const v = localStorage.getItem(k); return v == null ? null : { value: v }; },
      set: async (k, v) => { localStorage.setItem(k, v); return { value: v }; },
    };
  }
} catch (e) {}
</script>
</body>
</html>
